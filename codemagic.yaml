workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - flutter pub get
      - cd ios && pod install
      - flutter build ios --release --no-codesign
      - |
        mkdir -p build/ios/ipa
        cd build/ios/iphoneos
        mkdir -p Payload
        cp -r Runner.app Payload/
        zip -r ../ipa/Runner.ipa Payload/
    artifacts:
      - build/ios/ipa/*.ipa
