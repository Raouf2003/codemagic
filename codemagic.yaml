workflows:
  android-build:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - flutter pub get
      - flutter build apk --release --split-per-abi
    artifacts:
      - build/app/outputs/flutter-apk/*.apk

  ios-build:
    name: iOS Build
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - flutter pub get
      - cd ios && pod install
      - flutter build ios --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
